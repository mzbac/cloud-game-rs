name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * 0"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript,rust
          build-mode: manual

      - name: Build (Rust)
        run: |
          cd arcade-signal
          cargo build --locked
          cd ../arcade-worker
          cargo build --locked

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

