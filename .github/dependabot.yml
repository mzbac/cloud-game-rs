version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/arcade-portal"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "cargo"
    directory: "/arcade-signal"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/arcade-worker"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/deploy"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/deploy/dockerfiles"
    schedule:
      interval: "weekly"

